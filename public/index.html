<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>Web Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1b26;
      color: #a9b1d6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* --- Login --- */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      padding: 20px;
    }

    #login-screen h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #7aa2f7;
      margin-bottom: 8px;
    }

    #login-screen input {
      width: 100%;
      max-width: 320px;
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid #3b4261;
      border-radius: 8px;
      background: #24283b;
      color: #a9b1d6;
      outline: none;
    }

    #login-screen input:focus {
      border-color: #7aa2f7;
    }

    #login-screen button {
      width: 100%;
      max-width: 320px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #7aa2f7;
      color: #1a1b26;
      cursor: pointer;
    }

    #login-screen button:active {
      background: #5d87e0;
    }

    #login-error {
      color: #f7768e;
      font-size: 14px;
      min-height: 20px;
    }

    /* --- Connect Screen --- */
    #connect-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      height: 100%;
      padding: 20px;
      overflow-y: auto;
    }

    #connect-screen h2 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #7aa2f7;
      margin-bottom: 16px;
    }

    .connect-section {
      width: 100%;
      max-width: 420px;
      margin-bottom: 20px;
    }

    .connect-section h3 {
      font-size: 14px;
      font-weight: 600;
      color: #565f89;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .connect-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #24283b;
      border: 1px solid #3b4261;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }

    .connect-card:hover {
      border-color: #7aa2f7;
    }

    .connect-card:active {
      background: #292e42;
    }

    .connect-card .icon {
      font-size: 20px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1b26;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .connect-card .info {
      flex: 1;
      min-width: 0;
    }

    .connect-card .info .name {
      font-weight: 600;
      color: #c0caf5;
      font-size: 15px;
    }

    .connect-card .info .detail {
      font-size: 12px;
      color: #565f89;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .connect-card .delete-btn {
      padding: 4px 8px;
      font-size: 12px;
      background: none;
      border: 1px solid #3b4261;
      border-radius: 4px;
      color: #f7768e;
      cursor: pointer;
      flex-shrink: 0;
    }

    .connect-card .delete-btn:hover {
      background: #f7768e;
      color: #1a1b26;
    }

    /* --- SSH Form --- */
    #ssh-form {
      display: none;
      width: 100%;
      max-width: 420px;
      padding: 0;
    }

    #ssh-form .form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    #ssh-form .form-row.full > * { flex: 1; }

    #ssh-form label {
      display: block;
      font-size: 12px;
      color: #565f89;
      margin-bottom: 4px;
    }

    #ssh-form input, #ssh-form select {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: 1px solid #3b4261;
      border-radius: 8px;
      background: #24283b;
      color: #a9b1d6;
      outline: none;
    }

    #ssh-form input:focus, #ssh-form select:focus {
      border-color: #7aa2f7;
    }

    #ssh-form .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    #ssh-form .btn-row button {
      flex: 1;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #ssh-connect-btn {
      background: #9ece6a;
      color: #1a1b26;
    }

    #ssh-connect-btn:active {
      background: #7fb34e;
    }

    #ssh-cancel-btn {
      background: #3b4261;
      color: #a9b1d6;
    }

    #ssh-form .form-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    #ssh-form .form-check input[type="checkbox"] {
      width: 18px;
      height: 18px;
    }

    #ssh-form .form-check label {
      margin-bottom: 0;
      font-size: 14px;
      color: #a9b1d6;
    }

    #ssh-form .form-error {
      color: #f7768e;
      font-size: 13px;
      min-height: 18px;
      margin-top: 6px;
    }

    /* --- Terminal --- */
    #terminal-screen {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    #status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 12px;
      background: #24283b;
      font-size: 12px;
      flex-shrink: 0;
    }

    #status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9ece6a;
      margin-right: 6px;
    }

    #status-dot.disconnected { background: #f7768e; }
    #status-dot.connecting { background: #e0af68; }

    #session-info {
      color: #565f89;
      font-family: monospace;
    }

    #disconnect-btn {
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #3b4261;
      border-radius: 4px;
      background: none;
      color: #f7768e;
      cursor: pointer;
      margin-left: 8px;
    }

    #disconnect-btn:hover {
      background: #f7768e;
      color: #1a1b26;
    }

    #terminal-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* Visible scrollbar for drag scrolling */
    .xterm-viewport {
      -webkit-overflow-scrolling: touch !important;
    }
    .xterm-viewport::-webkit-scrollbar {
      width: 12px;
    }
    .xterm-viewport::-webkit-scrollbar-track {
      background: #1a1b26;
    }
    .xterm-viewport::-webkit-scrollbar-thumb {
      background: #3b4261;
      border-radius: 6px;
      border: 2px solid #1a1b26;
    }
    .xterm-viewport::-webkit-scrollbar-thumb:active {
      background: #7aa2f7;
    }

    /* --- Key Toolbar --- */
    #key-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 6px 8px;
      background: #24283b;
      border-top: 1px solid #3b4261;
      flex-shrink: 0;
      overflow-x: auto;
    }

    #key-toolbar button {
      padding: 8px 12px;
      min-width: 40px;
      font-size: 13px;
      font-family: monospace;
      font-weight: 600;
      border: 1px solid #3b4261;
      border-radius: 6px;
      background: #1a1b26;
      color: #a9b1d6;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #key-toolbar button:active {
      background: #7aa2f7;
      color: #1a1b26;
    }

    #key-toolbar button.sticky-active {
      background: #f7768e;
      color: #1a1b26;
      border-color: #f7768e;
    }

    /* --- Text Input Bar --- */
    #text-input-bar {
      display: flex;
      gap: 4px;
      padding: 6px 8px;
      background: #24283b;
      border-top: 1px solid #3b4261;
      flex-shrink: 0;
    }

    #text-input-bar input {
      flex: 1;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #3b4261;
      border-radius: 6px;
      background: #1a1b26;
      color: #a9b1d6;
      outline: none;
    }

    #text-input-bar input:focus {
      border-color: #7aa2f7;
    }

    #text-input-bar button {
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      touch-action: manipulation;
    }

    #send-btn {
      background: #7aa2f7;
      color: #1a1b26;
    }

    #send-btn:active {
      background: #5d87e0;
    }

    #send-raw-btn {
      background: #3b4261;
      color: #a9b1d6;
    }

    .hidden { display: none !important; }

    /* --- Scroll Overlay --- */
    #scroll-overlay {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 5;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
    }

    #scroll-overlay.active {
      display: block;
    }

    #scroll-overlay-inner {
      width: 100%;
    }

    /* --- Select Overlay --- */
    #select-overlay {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #1a1b26;
      z-index: 10;
      flex-direction: column;
    }

    #select-overlay.active {
      display: flex;
    }

    #select-overlay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #24283b;
      flex-shrink: 0;
    }

    #select-overlay-header button {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #select-close-btn {
      background: #3b4261;
      color: #a9b1d6;
    }

    #select-copy-btn {
      background: #7aa2f7;
      color: #1a1b26;
    }

    #select-content {
      flex: 1;
      overflow: auto;
      padding: 12px;
      font-family: '"D2Coding", "Noto Sans Mono CJK KR", monospace';
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-all;
      color: #a9b1d6;
      -webkit-user-select: text;
      user-select: text;
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-screen">
    <h1>Web Terminal</h1>
    <input type="password" id="password-input" placeholder="Password" autocomplete="current-password">
    <button id="login-btn">Connect</button>
    <div id="login-error"></div>
  </div>

  <!-- Connect: choose local or SSH -->
  <div id="connect-screen">
    <h2>Select Connection</h2>

    <!-- Local -->
    <div class="connect-section">
      <h3>Local</h3>
      <div class="connect-card" id="local-connect-card">
        <div class="icon">🖥</div>
        <div class="info">
          <div class="name">Local Terminal</div>
          <div class="detail">bash on this server</div>
        </div>
      </div>
    </div>

    <!-- SSH Hosts -->
    <div class="connect-section">
      <h3>SSH Hosts</h3>
      <div id="ssh-host-list"></div>
      <div class="connect-card" id="new-ssh-card">
        <div class="icon" style="color:#9ece6a;font-size:24px">+</div>
        <div class="info">
          <div class="name">New SSH Connection</div>
          <div class="detail">Connect to a remote server</div>
        </div>
      </div>
    </div>

    <!-- SSH Form -->
    <div id="ssh-form">
      <div class="connect-section" style="margin-bottom:0">
        <h3>SSH Connection</h3>
      </div>
      <div class="form-row">
        <div style="flex:2">
          <label>Host</label>
          <input type="text" id="ssh-host" placeholder="192.168.1.100">
        </div>
        <div style="flex:1">
          <label>Port</label>
          <input type="number" id="ssh-port" value="22" min="1" max="65535">
        </div>
      </div>
      <div class="form-row full">
        <div>
          <label>Username</label>
          <input type="text" id="ssh-username" placeholder="root">
        </div>
      </div>
      <div class="form-row full">
        <div>
          <label>Auth Type</label>
          <select id="ssh-auth-type">
            <option value="password">Password</option>
            <option value="key">SSH Key (server path)</option>
            <option value="agent">SSH Agent</option>
          </select>
        </div>
      </div>
      <div id="ssh-password-row" class="form-row full">
        <div>
          <label>Password</label>
          <input type="password" id="ssh-password" placeholder="Password">
        </div>
      </div>
      <div id="ssh-key-row" class="form-row full" style="display:none">
        <div>
          <label>Key Path (on server)</label>
          <input type="text" id="ssh-key-path" placeholder="~/.ssh/id_rsa">
        </div>
      </div>
      <div class="form-check">
        <input type="checkbox" id="ssh-save-host">
        <label for="ssh-save-host">Save this host</label>
      </div>
      <div class="form-error" id="ssh-error"></div>
      <div class="btn-row">
        <button id="ssh-cancel-btn">Cancel</button>
        <button id="ssh-connect-btn">Connect</button>
      </div>
    </div>
  </div>

  <!-- Terminal -->
  <div id="terminal-screen">
    <div id="status-bar">
      <span><span id="status-dot"></span><span id="status-text">Connected</span></span>
      <span>
        <span id="session-info"></span>
        <button id="disconnect-btn">Disconnect</button>
      </span>
    </div>
    <div id="terminal-container">
      <div id="scroll-overlay"><div id="scroll-overlay-inner"></div></div>
    </div>
    <div id="select-overlay">
      <div id="select-overlay-header">
        <button id="select-close-btn">Back</button>
        <span style="color:#a9b1d6;font-size:13px">Select &amp; Copy</span>
        <button id="select-copy-btn">Copy All</button>
      </div>
      <div id="select-content"></div>
    </div>
    <div id="text-input-bar">
      <input type="text" id="text-input" placeholder="Korean input here..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      <button id="send-btn">Send</button>
      <button id="send-raw-btn">Raw</button>
    </div>
    <div id="key-toolbar">
      <button data-sticky="ctrl">Ctrl</button>
      <button data-key="escape">Esc</button>
      <button data-key="tab">Tab</button>
      <button data-key="up">&#9650;</button>
      <button data-key="down">&#9660;</button>
      <button data-key="left">&#9664;</button>
      <button data-key="right">&#9654;</button>
      <button data-key="ctrl+c">C-c</button>
      <button data-key="ctrl+d">C-d</button>
      <button data-key="ctrl+z">C-z</button>
      <button data-key="ctrl+l">C-l</button>
      <button data-key="ctrl+a">C-a</button>
      <button data-key="ctrl+e">C-e</button>
      <button data-key="ctrl+r">C-r</button>
      <button data-key="ctrl+w">C-w</button>
      <button data-key="pipe">|</button>
      <button data-key="tilde">~</button>
      <button id="copy-btn" data-action="copy">Copy</button>
      <button id="scroll-toggle-btn" data-action="scroll-toggle">Scr</button>
      <button data-action="scroll-bottom">Bot</button>
      <button data-cmd="tmux new -As main">tmux</button>
      <button data-cmd="claude">cc</button>
      <button data-cmd="claude --resume">ccr</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
  <script>
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    // --- Screens ---
    const loginScreen = document.getElementById('login-screen');
    const connectScreen = document.getElementById('connect-screen');
    const terminalScreen = document.getElementById('terminal-screen');
    const passwordInput = document.getElementById('password-input');
    const loginBtn = document.getElementById('login-btn');
    const loginError = document.getElementById('login-error');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const sessionInfo = document.getElementById('session-info');
    const disconnectBtn = document.getElementById('disconnect-btn');

    let authToken = sessionStorage.getItem('terminal_token');
    let currentConnection = null; // { mode, host?, username? }

    if (authToken) {
      showConnectScreen();
    } else {
      passwordInput.focus();
    }

    // --- Login ---
    loginBtn.addEventListener('click', doLogin);
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      loginError.textContent = '';
      loginBtn.disabled = true;
      try {
        const res = await fetch('/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: passwordInput.value }),
        });
        const data = await res.json();
        if (!res.ok) {
          loginError.textContent = data.error || 'Login failed';
          return;
        }
        authToken = data.token;
        sessionStorage.setItem('terminal_token', authToken);
        showConnectScreen();
      } catch (err) {
        loginError.textContent = 'Connection error';
      } finally {
        loginBtn.disabled = false;
      }
    }

    // --- Connect Screen ---
    function showConnectScreen() {
      loginScreen.classList.add('hidden');
      terminalScreen.style.display = 'none';
      connectScreen.style.display = 'flex';
      document.getElementById('ssh-form').style.display = 'none';
      loadHostList();
    }

    // Local connect
    document.getElementById('local-connect-card').addEventListener('click', () => {
      currentConnection = { mode: 'local' };
      showTerminal({ type: 'connect_local' });
    });

    // New SSH
    document.getElementById('new-ssh-card').addEventListener('click', () => {
      const form = document.getElementById('ssh-form');
      form.style.display = 'block';
      document.getElementById('ssh-host').focus();
    });

    document.getElementById('ssh-cancel-btn').addEventListener('click', () => {
      document.getElementById('ssh-form').style.display = 'none';
      document.getElementById('ssh-error').textContent = '';
    });

    // Auth type toggle
    document.getElementById('ssh-auth-type').addEventListener('change', (e) => {
      const val = e.target.value;
      document.getElementById('ssh-password-row').style.display = val === 'password' ? '' : 'none';
      document.getElementById('ssh-key-row').style.display = val === 'key' ? '' : 'none';
    });

    // SSH connect
    document.getElementById('ssh-connect-btn').addEventListener('click', async () => {
      const host = document.getElementById('ssh-host').value.trim();
      const port = parseInt(document.getElementById('ssh-port').value) || 22;
      const username = document.getElementById('ssh-username').value.trim();
      const authType = document.getElementById('ssh-auth-type').value;
      const password = document.getElementById('ssh-password').value;
      const keyPath = document.getElementById('ssh-key-path').value.trim();
      const saveHost = document.getElementById('ssh-save-host').checked;
      const errorEl = document.getElementById('ssh-error');

      errorEl.textContent = '';

      if (!host) { errorEl.textContent = 'Host is required'; return; }
      if (!username) { errorEl.textContent = 'Username is required'; return; }
      if (authType === 'password' && !password) { errorEl.textContent = 'Password is required'; return; }
      if (authType === 'key' && !keyPath) { errorEl.textContent = 'Key path is required'; return; }

      // Save host preset if checked
      if (saveHost) {
        try {
          await fetch('/api/hosts', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${authToken}`,
            },
            body: JSON.stringify({ host, port, username, auth_type: authType, key_path: keyPath }),
          });
        } catch { /* ignore save error */ }
      }

      currentConnection = { mode: 'ssh', host, username };
      showTerminal({
        type: 'connect_ssh',
        host, port, username,
        auth_type: authType,
        password: authType === 'password' ? password : '',
        key_path: authType === 'key' ? keyPath : '',
      });
    });

    // Load saved hosts
    async function loadHostList() {
      const list = document.getElementById('ssh-host-list');
      list.innerHTML = '';
      try {
        const res = await fetch('/api/hosts', {
          headers: { 'Authorization': `Bearer ${authToken}` },
        });
        if (!res.ok) return;
        const hosts = await res.json();
        hosts.forEach((h) => {
          const card = document.createElement('div');
          card.className = 'connect-card';
          card.innerHTML = `
            <div class="icon" style="color:#bb9af7">⇄</div>
            <div class="info">
              <div class="name">${escapeHtml(h.name)}</div>
              <div class="detail">${escapeHtml(h.host)}:${h.port} · ${escapeHtml(h.auth_type)}</div>
            </div>
            <button class="delete-btn" data-id="${escapeHtml(h.id)}">Del</button>
          `;

          // Click card to connect (not the delete button)
          card.addEventListener('click', (e) => {
            if (e.target.closest('.delete-btn')) return;
            connectToSavedHost(h);
          });

          // Delete button
          card.querySelector('.delete-btn').addEventListener('click', async (e) => {
            e.stopPropagation();
            await fetch(`/api/hosts/${h.id}`, {
              method: 'DELETE',
              headers: { 'Authorization': `Bearer ${authToken}` },
            });
            loadHostList();
          });

          list.appendChild(card);
        });
      } catch { /* ignore */ }
    }

    function connectToSavedHost(h) {
      if (h.auth_type === 'password') {
        // Fill form for password entry
        document.getElementById('ssh-host').value = h.host;
        document.getElementById('ssh-port').value = h.port;
        document.getElementById('ssh-username').value = h.username;
        document.getElementById('ssh-auth-type').value = h.auth_type;
        document.getElementById('ssh-auth-type').dispatchEvent(new Event('change'));
        document.getElementById('ssh-password').value = '';
        document.getElementById('ssh-key-path').value = h.key_path || '';
        document.getElementById('ssh-save-host').checked = false;
        document.getElementById('ssh-form').style.display = 'block';
        document.getElementById('ssh-password').focus();
      } else {
        // Key or agent auth - connect directly
        currentConnection = { mode: 'ssh', host: h.host, username: h.username };
        showTerminal({
          type: 'connect_ssh',
          host: h.host,
          port: h.port,
          username: h.username,
          auth_type: h.auth_type,
          password: '',
          key_path: h.key_path || '',
        });
      }
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // --- Terminal ---
    let term, fitAddon, ws;
    let reconnectTimer = null;
    let reconnectDelay = 1000;
    let pendingConnectMsg = null;

    function showTerminal(connectMsg) {
      pendingConnectMsg = connectMsg;
      connectScreen.style.display = 'none';
      loginScreen.classList.add('hidden');
      terminalScreen.style.display = 'flex';

      // Update session info
      if (connectMsg.type === 'connect_ssh') {
        sessionInfo.textContent = `${connectMsg.username}@${connectMsg.host}:${connectMsg.port || 22}`;
      } else {
        sessionInfo.textContent = 'local';
      }

      setTimeout(() => {
        initTerminal();
        connectWS();
      }, 50);
    }

    // Disconnect button -> back to connect screen
    disconnectBtn.addEventListener('click', () => {
      if (ws) {
        ws.onclose = null; // prevent reconnect
        ws.close();
        ws = null;
      }
      if (term) {
        term.dispose();
        term = null;
        fitAddon = null;
      }
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }
      showConnectScreen();
    });

    function backToLogin(msg) {
      sessionStorage.removeItem('terminal_token');
      authToken = null;
      if (term) {
        term.dispose();
        term = null;
        fitAddon = null;
      }
      terminalScreen.style.display = 'none';
      connectScreen.style.display = 'none';
      loginScreen.classList.remove('hidden');
      loginError.textContent = msg || 'Please login again.';
      passwordInput.focus();
    }

    function sendInput(data) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'input', data }));
      }
    }

    function initTerminal() {
      if (term) return;

      term = new Terminal({
        cursorBlink: true,
        fontSize: isMobile ? 13 : 15,
        fontFamily: '"D2Coding", "Noto Sans Mono CJK KR", "Cascadia Code", "Fira Code", monospace',
        theme: {
          background: '#1a1b26',
          foreground: '#a9b1d6',
          cursor: '#c0caf5',
          selectionBackground: '#33467c',
          black: '#15161e',
          red: '#f7768e',
          green: '#9ece6a',
          yellow: '#e0af68',
          blue: '#7aa2f7',
          magenta: '#bb9af7',
          cyan: '#7dcfff',
          white: '#a9b1d6',
          brightBlack: '#414868',
          brightRed: '#f7768e',
          brightGreen: '#9ece6a',
          brightYellow: '#e0af68',
          brightBlue: '#7aa2f7',
          brightMagenta: '#bb9af7',
          brightCyan: '#7dcfff',
          brightWhite: '#c0caf5',
        },
        scrollback: 5000,
        smoothScrollDuration: isMobile ? 100 : 0,
        scrollSensitivity: isMobile ? 5 : 1,
        allowProposedApi: true,
      });

      fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.loadAddon(new WebLinksAddon.WebLinksAddon());

      term.open(document.getElementById('terminal-container'));
      fitAddon.fit();
      term.focus();

      // Clipboard helper (works on HTTP too)
      function copyToClipboard(text) {
        if (navigator.clipboard) {
          navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
        } else {
          fallbackCopy(text);
        }
      }

      function fallbackCopy(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;left:-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }

      // Select mode: show buffer as selectable text
      function getTerminalText() {
        const buf = term.buffer.active;
        const lines = [];
        for (let i = 0; i <= buf.cursorY + buf.viewportY; i++) {
          const line = buf.getLine(i);
          if (line) lines.push(line.translateToString(true));
        }
        return lines.join('\n');
      }

      document.getElementById('copy-btn').addEventListener('click', (e) => {
        e.preventDefault();
        const overlay = document.getElementById('select-overlay');
        const content = document.getElementById('select-content');
        content.textContent = getTerminalText();
        overlay.classList.add('active');
      });

      document.getElementById('select-close-btn').addEventListener('click', () => {
        document.getElementById('select-overlay').classList.remove('active');
      });

      document.getElementById('select-copy-btn').addEventListener('click', () => {
        const content = document.getElementById('select-content');
        const sel = window.getSelection();
        const selectedText = sel && sel.toString();
        const text = selectedText || content.textContent;
        copyToClipboard(text);
        const btn = document.getElementById('select-copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy All'; }, 1000);
      });

      // Key input -> WebSocket
      term.onData((data) => {
        // If Ctrl sticky is active, convert to control char
        if (ctrlSticky && data.length === 1) {
          const code = data.toLowerCase().charCodeAt(0);
          if (code >= 97 && code <= 122) { // a-z
            data = String.fromCharCode(code - 96);
          }
          setCtrlSticky(false);
        }
        sendInput(data);
      });

      // Resize -> WebSocket
      term.onResize(({ cols, rows }) => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'resize', cols, rows }));
        }
      });

      // Window resize -> fit
      window.addEventListener('resize', handleResize);

      // Mobile: visualViewport for keyboard
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', handleResize);
      }

      // Mobile: tap terminal to focus keyboard (only when scroll mode is off)
      if (isMobile) {
        document.getElementById('terminal-container').addEventListener('touchend', (e) => {
          if (!scrollMode && e.target.id !== 'scroll-overlay') {
            const textarea = document.querySelector('.xterm-helper-textarea');
            if (textarea) textarea.focus({ preventScroll: true });
          }
        }, { passive: true });
      }

      initKeyToolbar();
      initTextInput();
    }

    function handleResize() {
      if (!fitAddon) return;
      const container = document.getElementById('terminal-container');
      if (window.visualViewport) {
        const statusBar = document.getElementById('status-bar');
        const toolbar = document.getElementById('key-toolbar');
        const textBar = document.getElementById('text-input-bar');
        const used = statusBar.offsetHeight + toolbar.offsetHeight + textBar.offsetHeight;
        container.style.height = (window.visualViewport.height - used) + 'px';
      }
      fitAddon.fit();
    }

    // --- Text Input Bar ---
    function initTextInput() {
      const input = document.getElementById('text-input');
      const sendBtn = document.getElementById('send-btn');
      const sendRawBtn = document.getElementById('send-raw-btn');

      // Send: text + Enter
      sendBtn.addEventListener('click', () => {
        if (input.value) {
          sendInput(input.value + '\r');
          input.value = '';
        }
        input.focus();
      });

      // Raw: text only (no Enter)
      sendRawBtn.addEventListener('click', () => {
        if (input.value) {
          sendInput(input.value);
          input.value = '';
        }
        input.focus();
      });

      // Enter key in input field = send
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.isComposing) {
          e.preventDefault();
          sendBtn.click();
        }
      });
    }

    // --- Key Toolbar ---
    let ctrlSticky = false;
    let scrollMode = false;

    function setScrollMode(active) {
      scrollMode = active;
      const btn = document.getElementById('scroll-toggle-btn');
      const overlay = document.getElementById('scroll-overlay');
      const inner = document.getElementById('scroll-overlay-inner');
      if (btn) btn.classList.toggle('sticky-active', active);

      if (active && term) {
        // Set inner height to match terminal's total scrollback
        const lineHeight = Math.ceil(term.element.querySelector('.xterm-screen').offsetHeight / term.rows);
        const totalLines = term.buffer.active.length;
        inner.style.height = (totalLines * lineHeight) + 'px';

        // Sync overlay scroll to terminal position
        const viewportLine = term.buffer.active.viewportY;
        overlay.scrollTop = viewportLine * lineHeight;

        overlay.classList.add('active');

        // Sync terminal scroll when overlay is scrolled
        overlay._scrollHandler = () => {
          const line = Math.round(overlay.scrollTop / lineHeight);
          term.scrollToLine(line);
        };
        overlay.addEventListener('scroll', overlay._scrollHandler, { passive: true });
      } else {
        overlay.classList.remove('active');
        if (overlay._scrollHandler) {
          overlay.removeEventListener('scroll', overlay._scrollHandler);
          overlay._scrollHandler = null;
        }
      }
    }

    function setCtrlSticky(active) {
      ctrlSticky = active;
      const btn = document.querySelector('[data-sticky="ctrl"]');
      if (btn) btn.classList.toggle('sticky-active', active);
    }

    const KEY_MAP = {
      'escape':  '\x1b',
      'tab':     '\t',
      'up':      '\x1b[A',
      'down':    '\x1b[B',
      'right':   '\x1b[C',
      'left':    '\x1b[D',
      'ctrl+c':  '\x03',
      'ctrl+d':  '\x04',
      'ctrl+z':  '\x1a',
      'ctrl+l':  '\x0c',
      'ctrl+a':  '\x01',
      'ctrl+e':  '\x05',
      'ctrl+r':  '\x12',
      'ctrl+w':  '\x17',
      'pipe':    '|',
      'tilde':   '~',
    };

    function initKeyToolbar() {
      const toolbar = document.getElementById('key-toolbar');

      function handleBtn(btn) {
        if (!btn) return;

        // Scroll toggle
        if (btn.dataset.action === 'scroll-toggle') {
          setScrollMode(!scrollMode);
          return;
        }

        // Scroll to bottom
        if (btn.dataset.action === 'scroll-bottom') {
          if (term) term.scrollToBottom();
          if (scrollMode) setScrollMode(false);
          return;
        }

        // Sticky Ctrl
        if (btn.dataset.sticky === 'ctrl') {
          setCtrlSticky(!ctrlSticky);
          refocusTerminal();
          return;
        }

        // Command shortcut
        if (btn.dataset.cmd) {
          sendInput(btn.dataset.cmd + '\r');
          refocusTerminal();
          return;
        }

        const key = btn.dataset.key;
        if (key && KEY_MAP[key]) {
          sendInput(KEY_MAP[key]);
          if (ctrlSticky) setCtrlSticky(false);
        }

        refocusTerminal();
      }

      function refocusTerminal() {
        if (isMobile) return; // Don't steal focus on mobile (prevents keyboard popup)
        setTimeout(() => {
          const textarea = document.querySelector('.xterm-helper-textarea');
          if (textarea) textarea.focus({ preventScroll: true });
        }, 50);
      }

      // Prevent focus steal from terminal (desktop)
      toolbar.addEventListener('mousedown', (e) => {
        e.preventDefault();
        handleBtn(e.target.closest('button'));
      });

      // Mobile: handle on touchend
      toolbar.addEventListener('touchstart', (e) => {
        if (e.target.closest('button')) e.preventDefault();
      }, { passive: false });

      toolbar.addEventListener('touchend', (e) => {
        e.preventDefault();
        handleBtn(e.target.closest('button'));
      }, { passive: false });
    }

    // --- WebSocket ---
    function connectWS() {
      if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
      }

      setStatus('connecting', 'Connecting...');

      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}/ws?token=${encodeURIComponent(authToken)}`);

      ws.onopen = () => {
        setStatus('connecting', 'Authenticating...');
        reconnectDelay = 1000;

        // Send connect message with terminal size
        const msg = { ...pendingConnectMsg };
        if (term) {
          msg.cols = term.cols;
          msg.rows = term.rows;
        }
        ws.send(JSON.stringify(msg));
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'connected') {
            setStatus('connected', 'Connected');
            if (term) term.focus();
          } else if (msg.type === 'output') {
            term.write(msg.data);
          } else if (msg.type === 'exit') {
            term.write('\r\n\x1b[33m[Session ended]\x1b[0m\r\n');
            setStatus('disconnected', 'Session ended');
          } else if (msg.type === 'error') {
            term.write(`\r\n\x1b[31m[Error: ${msg.data}]\x1b[0m\r\n`);
          }
        } catch { /* ignore */ }
      };

      ws.onclose = (event) => {
        // Auth failure
        if (event.code === 4001) {
          backToLogin('Session expired. Please login again.');
          return;
        }

        // Max sessions
        if (event.code === 4002) {
          if (term) term.write('\r\n\x1b[31m[Max sessions reached. Close other tabs and retry.]\x1b[0m\r\n');
          setStatus('disconnected', 'Max sessions');
          return;
        }

        // SSH connection failed
        if (event.code === 4004) {
          setStatus('disconnected', 'SSH failed');
          // Auto back to connect screen after a moment
          setTimeout(() => {
            if (term) {
              term.dispose();
              term = null;
              fitAddon = null;
            }
            showConnectScreen();
          }, 2000);
          return;
        }

        setStatus('disconnected', 'Disconnected');
        if (term) term.write('\r\n\x1b[31m[Disconnected. Reconnecting...]\x1b[0m\r\n');
        reconnectTimer = setTimeout(() => {
          reconnectDelay = Math.min(reconnectDelay * 2, 30000);
          connectWS();
        }, reconnectDelay);
      };

      ws.onerror = () => {};
    }

    function setStatus(state, text) {
      statusDot.className = state === 'connected' ? '' : state;
      statusText.textContent = text;
    }
  </script>
</body>
</html>
